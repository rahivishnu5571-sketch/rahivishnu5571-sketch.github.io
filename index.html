<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Free AI Image Prompt Generator Online</title>
<meta name="description" content="Generate high quality AI image prompts for Midjourney, Leonardo AI, and other AI art tools. Free and easy to use.">

<!-- Google AdSense -->
<script async 
src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4941767862788383"
crossorigin="anonymous"></script>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:white;
    text-align:center;
}

header{
    padding:20px;
    font-size:24px;
    font-weight:bold;
}

.container{
    padding:20px;
    max-width:800px;
    margin:auto;
}

input, select{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:8px;
}

button{
    margin-top:15px;
    padding:12px 25px;
    background:#00c853;
    border:none;
    color:white;
    font-size:16px;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    background:#009624;
}

.result{
    margin-top:20px;
    background:#111;
    padding:20px;
    border-radius:10px;
    word-wrap:break-word;
}

.copy-btn{
    background:#ff9800;
    margin-top:10px;
}
.footer{
    margin-top:40px;
    padding:20px;
    font-size:14px;
    background:#00000040;
}
</style>
</head>

<body>

<header>🔥 AI Image Prompt Generator</header>

<div class="container">

<!-- Top Ad Unit -->
<ins class="adsbygoogle"
     style="display:block"
     data-ad-client="ca-pub-4941767862788383"
     data-ad-slot="1234567890"
     data-ad-format="auto"
     data-full-width-responsive="true"></ins>
<script>
     (adsbygoogle = window.adsbygoogle || []).push({});
</script>

<h2>Create High Quality AI Prompts</h2>

<input type="text" id="idea" placeholder="Enter your idea (e.g. cyberpunk city at night)">

<select id="style">
    <option value="cinematic">Cinematic</option>
    <option value="ultra realistic">Ultra Realistic</option>
    <option value="anime">Anime Style</option>
    <option value="fantasy art">Fantasy Art</option>
    <option value="3D render">3D Render</option>
</select>

<button onclick="generatePrompt()">Generate Prompt</button>

<div class="result" id="output"></div>

<button class="copy-btn" onclick="copyText()">Copy Prompt</button>

</div>

<div class="footer">
© 2026 Vishnu AI Tools | Free AI Prompt Generator
</div>

<script>
function generatePrompt(){
    var idea = document.getElementById("idea").value;
    var style = document.getElementById("style").value;

    if(idea==""){
        alert("Please enter your idea");
        return;
    }

    var prompt = idea + ", " + style + 
    ", highly detailed, 8K resolution, dramatic lighting, professional photography, ultra quality, trending on artstation";

    document.getElementById("output").innerHTML = prompt;
}

function copyText(){
    var text = document.getElementById("output").innerText;
    navigator.clipboard.writeText(text);
    alert("Prompt Copied!");
}
</script>

</body>
</html>
